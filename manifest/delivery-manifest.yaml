# Pilot = the SPEC 2.8 RealWorld *feature* task (Draft articles). Authored feature
# (not commit-mined): the feature does not exist at pinned_commit.
pilot_task:
  task_id: pilot-realworld-draft-articles
  repo: https://github.com/gothinkster/node-express-realworld-example-app
  pinned_commit: 30b68e1e881462b2f4164ea09ab4c4f5699c7b0b   # RealWorld HEAD; Draft feature absent
  license: MIT
  contamination_tier: famous   # see tasks/pilot-realworld/README.md; SPEC 5.2 / WORKLOAD-SELECTION 2

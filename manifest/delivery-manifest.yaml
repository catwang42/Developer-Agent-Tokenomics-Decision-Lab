# W4 complex-bugfix / F2 feasibility bugfix. Commit-mined per WORKLOAD-SELECTION 4:
# re-implement the change in canonical_fix_commit starting from pinned_commit (its
# parent, where the bug is present). Our first commit-mining exemplar.
w4_task:
  task_id: w4-realworld-missing-user-id
  repo: https://github.com/gothinkster/node-express-realworld-example-app
  pinned_commit: 88b258ce54aaf54ff52511ba26edd52e36df201e   # parent of the fix; bug present pre-modification
  canonical_fix_commit: 30b68e1e881462b2f4164ea09ab4c4f5699c7b0b   # upstream "fix: missing user id"
  license: MIT
  contamination_tier: famous   # see tasks/suite/W4-complex-bugfix/README.md
  baseline_test_scope: hermetic_db_free

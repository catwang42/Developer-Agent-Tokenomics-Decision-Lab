# Dated delivery manifest — the ONLY place volatile names/prices resolve (SPEC 1.4)
# Resolved for the Phase 3 feasibility batch-1 delivery. Pending CP-SPEND approval.
delivery_date: 2026-07-19
cohort: pilot
pricing_snapshot: pricing/prices-2026-07-19.json
task_suite_commit: 17b9990106f3379e1d3df78137b2adb8ef10e798   # batch-1 run commit (pinned at CP-SPEND execution 2026-07-19)
configurations:
  # Controlled API (Product A = Claude Code) on Google Vertex, project
  # vital-octagon-19612. model_id values are the EXACT Vertex publisher model IDs
  # verified available & GA on 2026-07-19 via the Vertex REST publisher-models
  # endpoint (GET publishers/anthropic/models/<id>, us-central1: 200 + launchStage
  # GA; a bogus id returns 404, so the 200 is meaningful).
  # NOTE: claude-sonnet-4-6 exposes only the floating '@default' version alias (no
  # dated snapshot) — a reproducibility caveat recorded per SPEC 6.3; the routed
  # build behind @default is not guaranteed stable across the batch. MITIGATION:
  # every run records the concrete resolved model version from the product's JSON
  # `model` field into identity.model_or_selector (authoritative), pinning per-run
  # reproducibility despite the floating alias (claude_code.resolved_model_version).
  STRONG_MODEL_A:
    provider: google_vertex
    product_surface: controlled_api
    model_id: claude-sonnet-4-6@default
    region: us-central1
    cost_basis: marginal_api_cost
  ECONOMICAL_MODEL_A:
    provider: google_vertex
    product_surface: controlled_api
    model_id: claude-haiku-4-5@20251001
    region: us-central1
    cost_basis: marginal_api_cost
  # Product B (Antigravity CLI, `agy`) black-box. selector_label recorded VERBATIM;
  # backend model_id NEVER inferred (SPEC 6.3). Marginal PAYG priced via the mapped
  # Gemini published rates in the pricing snapshot, keyed by the verbatim label.
  PRODUCT_B_ECON_TIER:
    provider: google
    product_surface: product_blackbox
    selector_label: "Gemini 3.5 Flash (High)"
    model_id: null
    cost_basis: marginal_api_cost
  PRODUCT_B_STRONG_TIER:
    provider: google
    product_surface: product_blackbox
    selector_label: "Gemini 3.1 Pro (High)"
    model_id: null
    cost_basis: marginal_api_cost
notes: >
  record selector labels verbatim; never infer unguaranteed backend model IDs
  (SPEC 6.3). Claude billed via Vertex (project vital-octagon-19612); prices in the
  snapshot are global-endpoint list rates, with the us-central1 regional +10%
  premium recorded as a per-model sensitivity. C5 executor uses PRODUCT_B_ECON_TIER.
  Product B token telemetry is partial: unexposed usage -> unavailable (never 0),
  so a C3/C5 leg may be cost_unavailable at runtime.


# Pilot task definition (SPEC 2.8: the RealWorld *feature* task). Volatile pins are
# authoritative in manifest/delivery-manifest.yaml (pilot_task); this file mirrors
# them and adds gate wiring. Manifest wins on disagreement (tests/test_tasks.py).
# Driven by the shared harness:
#   TASK_DIR=tasks/pilot-realworld bash harness/task-tools/validate.sh
task_id: pilot-realworld-draft-articles
manifest_key: pilot_task
task_suite_version: pilot-v1
class: feature_implementation

# Source. RealWorld/Conduit API (MIT). Feature authored by us (not commit-mined):
# the Draft-articles feature does not exist at the pinned commit.
repo: https://github.com/gothinkster/node-express-realworld-example-app
pinned_commit: 30b68e1e881462b2f4164ea09ab4c4f5699c7b0b
license: MIT
contamination_tier: famous

# Participant-visible prompt. Must NOT ask the model to report its own tokens.
prompt: |
  Add a "Draft articles" feature to the API. Articles can be created as drafts via
  a boolean `draft` field (default false, persisted on the Article model). Draft
  articles must be excluded from the public article list (GET /articles) so only
  non-draft articles are returned there. Persist the draft flag on create and
  filter drafts out of the public listing. Keep changes minimal and consistent
  with the existing Prisma/service patterns; no unrelated diffs.

# Acceptance gate (SPEC 2.6 deterministic-first; hidden test is authoritative).
canonical_patch: canonical/draft-articles.patch   # PRODUCT code only (no test files)
public_test: tests/draft-articles.public.test.ts
public_test_desc: Draft articles feature spec (create persists draft; list excludes drafts)
public_test_kind: feature   # pre-mod failure: field/behaviour absent on unmodified repo (SPEC 2.8)
# Agent-allowed diff scope: PRODUCT files only. The gate restores all test files to
# pristine before grading and forbids any agent edit to a test file (diff-scope),
# so a solution cannot pass by weakening tests.
target_paths:
  - src/app/routes/article/article.service.ts
  - src/prisma/schema.prisma
# Harness-owned type-compat shim (NOT part of the agent's solution, NOT agent-
# modifiable). The new `draft` field is required-typed in the generated Prisma
# client, so the immutable baseline suite's result mocks need `draft` to compile.
# The gate applies this AFTER restoring tests to pristine; it touches only *.test.ts.
test_compat_patch: gate/test-compat.patch

# Baseline scoped to hermetic DB-free suites (upstream auth suite needs a live DB;
# see harness/task-tools/README.md and tasks/WORKLOAD-SELECTION.md).
baseline_test_scope: hermetic_db_free
baseline_test_pattern: "article|profile|utils"
static_checks: [typecheck, build]

expected_wallclock_s: null       # measured in Phase 3; never fabricated
configurations: [C1, C2, P0, P1]
reps_feasibility: 3

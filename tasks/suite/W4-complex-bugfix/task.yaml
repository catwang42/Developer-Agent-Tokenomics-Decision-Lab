# W4 complex-bugfix task definition (SPEC 2.8 rules; SPEC 5.1 workload class W4).
# Volatile pins are the source of truth in manifest/delivery-manifest.yaml
# (w4_task); this file mirrors them and adds gate wiring. Manifest wins on
# disagreement (tests/test_tasks.py enforces consistency). Driven by the shared
# harness: TASK_DIR=tasks/suite/W4-complex-bugfix bash harness/task-tools/validate.sh
task_id: w4-realworld-missing-user-id
manifest_key: w4_task
task_suite_version: pilot-v1
class: complex_bugfix

# Source (commit-mined, WORKLOAD-SELECTION.md 4) — our first commit-mining exemplar.
repo: https://github.com/gothinkster/node-express-realworld-example-app
pinned_commit: 88b258ce54aaf54ff52511ba26edd52e36df201e
canonical_fix_commit: 30b68e1e881462b2f4164ea09ab4c4f5699c7b0b
license: MIT
contamination_tier: famous

prompt: |
  The `getCurrentUser` service returns the authenticated user's profile, but the
  returned object is missing the user's `id` and the issued JWT is signed with an
  undefined id. Find the root cause and fix it so the current user's numeric id is
  retrieved from the data layer and carried through to the response and token.
  Change only what is necessary; do not introduce unrelated diffs.

# Acceptance gate (SPEC 2.6 deterministic-first; hidden test is authoritative)
canonical_patch: canonical/fix-missing-user-id.patch
public_test: tests/getCurrentUser.repro.test.ts
public_test_desc: getCurrentUser repro (selects user id)
public_test_kind: repro
target_paths:
  - src/app/routes/auth/auth.service.ts

# Baseline scoped to hermetic DB-free suites (upstream auth suite needs a live DB;
# see harness/task-tools/README.md and tasks/WORKLOAD-SELECTION.md).
baseline_test_scope: hermetic_db_free
baseline_test_pattern: "article|profile|utils"
static_checks: [typecheck, build]

expected_wallclock_s: null
configurations: [C1, C2, C3, C5]
reps_screening: 3

workload_id: W6
class: code_review
status: candidate
# Added before CP-SCREEN-PREREG per SPEC §5 anti-bias protocol (pre-register the
# task set before running; publish all classes including null/negative findings).
repo: CHOOSE-AT-CP-SCREEN-PREREG   # candidate: a diff/PR with k defects seeded by us on a pinned base commit
pinned_commit: PIN-BEFORE-PREREG
contamination_tier: TBD-AT-PREREG   # depends on repo chosen at CP-SCREEN-PREREG; see tasks/WORKLOAD-SELECTION.md §2
language: typescript
prompt: |
  DRAFT — finalize before pre-registration. Review the following diff and report the
  defects you find (correctness, security, and regression risks), each with file and
  line. Report only defects you can justify from the diff.
  (MUST NOT ask the model to report its own tokens.)
gate:
  # Deterministic scoring against a sealed map of the k seeded defects. Detection is
  # matched by file+line/defect-id, NOT by model judgment — this is a deterministic
  # gate over a known ground truth, consistent with SPEC §2.6.
  public: gate/check-public.sh
  hidden: recorded-by-hash-at-run     # sealed seeded-defect map + evaluator, human-held under tasks/hidden/
  reset: reset.sh
pass_condition: >
  Detects >= k-1 of the k seeded defects AND reports zero fabricated issues
  (any reported defect not in the seeded map counts as a fabrication). k recorded
  in the sealed map at pre-registration.
expected_wallclock_s: null
configurations: [C1, C2, C3, C5]
reps_screening: 3
class_claim_note: >
  One task = screening signal only. A workload-class claim requires a second,
  materially different task from this class at tier obscure or post_cutoff
  (tasks/WORKLOAD-SELECTION.md §3, extending SPEC §5.2); commit mining preferred (§4).
preregistration: TBD
